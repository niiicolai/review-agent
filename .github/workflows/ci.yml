name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run worker (syntax check)
        run: node --check worker.js

      - name: Run webhook (syntax check)
        run: node --check webhook.js

      - name: Run tests
        run: npm test
        env:
          REDIS_URL: redis://localhost:6379
          GITHUB_PRIVATE_KEY: 123
          SHORT_TERM_MEMORY_MAX_MESSAGES: 2
          MAX_TOKENS_ALLOWED: 50000
